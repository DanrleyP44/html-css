<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1{
            background-color: lightblue;
            height: 300px;
            width: 300px;
            border: 10px solid rgb(17, 69, 2);
            padding: 10px;
            outline: 5px dashed salmon;
            margin-bottom: 50px;
        }

        a{
            border: 10px solid red;
            padding: 10px;
            outline: 10px dashed blue;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são elementos box-level, mas os <a href="#">links são exemplos de caixas inline-level</a></p>
</body>
</html>
