<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizando links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: darkred;
        }
        a:hover{
            text-decoration: underline;
            color: black;
        }
        a:active{
            color: blue;
        }
        .special::before{
            content: "[link]";
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }
        .special::after{
            content: "[link]";
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/Dan4898" target="_blank" class="special">Repositório GitHub</a></li>
        <li><a href="https://youtube.com" target="_blank" >YouTube</a></li>
        <li><a href="https://instagram.com" target="_blank" >Instagram</a></li>
    </ul>
</body>
</html>
